openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Dosa Ji Restaurant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: menu
  - name: orders
  - name: users
  - name: coupons
  - name: dashboard
  - name: payment

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── MENU ────────────────────────────────────────────────────────────────────

  /menu:
    get:
      operationId: listMenuItems
      tags: [menu]
      summary: List all menu items
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: isVeg
          in: query
          schema:
            type: boolean
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create a menu item (shopkeeper/admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /menu/{id}:
    get:
      operationId: getMenuItem
      tags: [menu]
      summary: Get a menu item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateMenuItem
      tags: [menu]
      summary: Update a menu item (shopkeeper/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MenuItemUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteMenuItem
      tags: [menu]
      summary: Delete a menu item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /menu/{id}/availability:
    patch:
      operationId: toggleMenuItemAvailability
      tags: [menu]
      summary: Toggle availability (shopkeeper/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AvailabilityUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"

  # ── ORDERS ───────────────────────────────────────────────────────────────────

  /orders:
    get:
      operationId: listAllOrders
      tags: [orders]
      summary: List all orders (shopkeeper/admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

    post:
      operationId: createOrder
      tags: [orders]
      summary: Place a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/my:
    get:
      operationId: listMyOrders
      tags: [orders]
      summary: List current user's orders
      responses:
        "200":
          description: My orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a single order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{id}/status:
    patch:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (shopkeeper/admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  # ── PAYMENT ──────────────────────────────────────────────────────────────────

  /payment/create-order:
    post:
      operationId: createPaymentOrder
      tags: [payment]
      summary: Create a Razorpay order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentOrderInput"
      responses:
        "200":
          description: Payment order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentOrderResponse"

  /payment/verify:
    post:
      operationId: verifyPayment
      tags: [payment]
      summary: Verify a Razorpay payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentVerifyInput"
      responses:
        "200":
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ── COUPONS ──────────────────────────────────────────────────────────────────

  /coupons:
    get:
      operationId: listCoupons
      tags: [coupons]
      summary: List coupons (admin)
      responses:
        "200":
          description: Coupons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Coupon"

    post:
      operationId: createCoupon
      tags: [coupons]
      summary: Create a coupon (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

  /coupons/apply:
    post:
      operationId: applyCoupon
      tags: [coupons]
      summary: Validate and apply a coupon code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponApplyInput"
      responses:
        "200":
          description: Coupon applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CouponApplyResult"
        "400":
          description: Invalid coupon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /coupons/{id}:
    patch:
      operationId: updateCoupon
      tags: [coupons]
      summary: Update a coupon (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CouponUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Coupon"

    delete:
      operationId: deleteCoupon
      tags: [coupons]
      summary: Delete a coupon (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── USERS ────────────────────────────────────────────────────────────────────

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [users]
      summary: Update user role (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/status:
    patch:
      operationId: updateUserStatus
      tags: [users]
      summary: Activate/deactivate user (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── DASHBOARD ────────────────────────────────────────────────────────────────

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard stats (shopkeeper/admin)
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/revenue:
    get:
      operationId: getRevenueChart
      tags: [dashboard]
      summary: Revenue data for charts (admin)
      responses:
        "200":
          description: Revenue chart data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueDataPoint"

  /dashboard/orders-by-day:
    get:
      operationId: getOrdersByDay
      tags: [dashboard]
      summary: Orders per day for charts
      responses:
        "200":
          description: Orders by day
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderDayPoint"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ── AUTH ──────────────────────────────────────────────────────────────────

    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [customer, shopkeeper, admin]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [customer, shopkeeper, admin]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    # ── MENU ──────────────────────────────────────────────────────────────────

    MenuItem:
      type: object
      required: [id, name, description, price, category, imageUrl, isVeg, isAvailable, isFeatured, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        isVeg:
          type: boolean
        isAvailable:
          type: boolean
        isFeatured:
          type: boolean
        sizes:
          type: string
          nullable: true
        createdAt:
          type: string

    MenuItemInput:
      type: object
      required: [name, description, price, category, imageUrl, isVeg]
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
        price:
          type: number
          minimum: 0
        category:
          type: string
        imageUrl:
          type: string
        isVeg:
          type: boolean
        isAvailable:
          type: boolean
        isFeatured:
          type: boolean
        sizes:
          type: string
          nullable: true

    MenuItemUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        isVeg:
          type: boolean
        isAvailable:
          type: boolean
        isFeatured:
          type: boolean
        sizes:
          type: string
          nullable: true

    AvailabilityUpdate:
      type: object
      required: [isAvailable]
      properties:
        isAvailable:
          type: boolean

    # ── ORDERS ────────────────────────────────────────────────────────────────

    OrderItem:
      type: object
      required: [menuItemId, name, price, quantity, imageUrl]
      properties:
        menuItemId:
          type: integer
        name:
          type: string
        price:
          type: number
        quantity:
          type: integer
        imageUrl:
          type: string

    DeliveryAddress:
      type: object
      required: [name, phone, addressLine1, city, pincode]
      properties:
        name:
          type: string
        phone:
          type: string
        addressLine1:
          type: string
        addressLine2:
          type: ["string", "null"]
        city:
          type: string
        pincode:
          type: string

    OrderInput:
      type: object
      required: [items, deliveryAddress]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        deliveryAddress:
          $ref: "#/components/schemas/DeliveryAddress"
        couponCode:
          type: ["string", "null"]
        razorpayOrderId:
          type: ["string", "null"]
        razorpayPaymentId:
          type: ["string", "null"]
        razorpaySignature:
          type: ["string", "null"]

    Order:
      type: object
      required: [id, userId, items, deliveryAddress, subtotal, deliveryCharge, gst, couponDiscount, total, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        customerName:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        deliveryAddress:
          $ref: "#/components/schemas/DeliveryAddress"
        subtotal:
          type: number
        deliveryCharge:
          type: number
        gst:
          type: number
        couponDiscount:
          type: number
        total:
          type: number
        razorpayOrderId:
          type: ["string", "null"]
        razorpayPaymentId:
          type: ["string", "null"]
        status:
          type: string
          enum: [Placed, Preparing, OutForDelivery, Delivered, Cancelled]
        createdAt:
          type: string

    OrderStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [Placed, Preparing, OutForDelivery, Delivered, Cancelled]

    # ── PAYMENT ───────────────────────────────────────────────────────────────

    PaymentOrderInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number

    PaymentOrderResponse:
      type: object
      required: [id, amount, currency]
      properties:
        id:
          type: string
        amount:
          type: number
        currency:
          type: string
        keyId:
          type: ["string", "null"]

    PaymentVerifyInput:
      type: object
      required: [orderId, razorpayOrderId, razorpayPaymentId, razorpaySignature]
      properties:
        orderId:
          type: integer
        razorpayOrderId:
          type: string
        razorpayPaymentId:
          type: string
        razorpaySignature:
          type: string

    # ── COUPONS ───────────────────────────────────────────────────────────────

    Coupon:
      type: object
      required: [id, code, discountType, value, minOrder, maxUses, usedCount, isActive, createdAt]
      properties:
        id:
          type: integer
        code:
          type: string
        discountType:
          type: string
          enum: [percent, flat]
        value:
          type: number
        minOrder:
          type: number
        maxUses:
          type: integer
        usedCount:
          type: integer
        expiresAt:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string

    CouponInput:
      type: object
      required: [code, discountType, value, minOrder, maxUses]
      properties:
        code:
          type: string
        discountType:
          type: string
          enum: [percent, flat]
        value:
          type: number
        minOrder:
          type: number
        maxUses:
          type: integer
        expiresAt:
          type: ["string", "null"]
        isActive:
          type: boolean

    CouponUpdate:
      type: object
      properties:
        code:
          type: string
        discountType:
          type: string
          enum: [percent, flat]
        value:
          type: number
        minOrder:
          type: number
        maxUses:
          type: integer
        expiresAt:
          type: ["string", "null"]
        isActive:
          type: boolean

    CouponApplyInput:
      type: object
      required: [code, orderTotal]
      properties:
        code:
          type: string
        orderTotal:
          type: number

    CouponApplyResult:
      type: object
      required: [discount, finalTotal, message]
      properties:
        discount:
          type: number
        finalTotal:
          type: number
        message:
          type: string

    # ── USERS ─────────────────────────────────────────────────────────────────

    UserRoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [customer, shopkeeper, admin]

    UserStatusUpdate:
      type: object
      required: [isActive]
      properties:
        isActive:
          type: boolean

    # ── DASHBOARD ─────────────────────────────────────────────────────────────

    DashboardStats:
      type: object
      required: [totalMenuItems, todayOrders, todayRevenue, pendingOrders, totalOrders, totalUsers, totalRevenue]
      properties:
        totalMenuItems:
          type: integer
        todayOrders:
          type: integer
        todayRevenue:
          type: number
        pendingOrders:
          type: integer
        totalOrders:
          type: integer
        totalUsers:
          type: integer
        totalRevenue:
          type: number

    RevenueDataPoint:
      type: object
      required: [date, revenue]
      properties:
        date:
          type: string
        revenue:
          type: number

    OrderDayPoint:
      type: object
      required: [day, count]
      properties:
        day:
          type: string
        count:
          type: integer
