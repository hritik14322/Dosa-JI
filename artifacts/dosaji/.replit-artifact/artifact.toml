kind = "web"
previewPath = "/"
title = "Dosa Ji"
version = "1.0.0"
id = "artifacts/dosaji"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24582

[services.development]
run = "pnpm --filter @workspace/dosaji run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dosaji", "run", "build" ]
publicDir = "artifacts/dosaji/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24582"
BASE_PATH = "/"
